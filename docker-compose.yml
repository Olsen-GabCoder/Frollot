version: "3.9"

# ========================================
# DOCKER COMPOSE - Frollot Application
# ========================================
# Usage:
#   Development: docker-compose up -d
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # =========================
  # Base de données MySQL
  # =========================
  mysql:
    image: mysql:8.0
    container_name: frollot_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-coiffure_db}
      MYSQL_USER: ${MYSQL_USER:-coiffure_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - frollot_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # =========================
  # Backend Spring Boot
  # =========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: frollot_backend
    environment:
      # Base de données
      DB_URL: jdbc:mysql://mysql:3307/${MYSQL_DATABASE:-coiffure_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: ${MYSQL_USER:-coiffure_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      
      # Sécurité JWT (OBLIGATOIRE en production)
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-15}
      
      # Profil Spring
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      
      # Flyway
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      
      # Email (optionnel)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      
      # Firebase (optionnel)
      FIREBASE_ENABLED: ${FIREBASE_ENABLED:-false}
      
      # Stripe (optionnel)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "${BACKEND_PORT:-9090}:9090"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - frollot_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/manage/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# =========================
# Volumes persistants
# =========================
volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

# =========================
# Réseau interne
# =========================
networks:
  frollot_network:
    driver: bridge
